services:
  db:
    image: mysql:8.0
    container_name: elderly-care-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-your_db_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-elderly_care}
      MYSQL_USER: ${MYSQL_USER:-admin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-your_db_password}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./elderly_care.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-your_db_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  frontend:
    image: nginx:latest
    container_name: elderly-care-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - elderly-care-network
    volumes:
      - ./elderlycarefrontend/:/usr/share/nginx/html/
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

volumes:
  db-data:
    driver: local

networks:
  elderly-care-network:
    driver: bridge
    name: elderly-care-network
